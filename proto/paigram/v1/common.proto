syntax = "proto3";

package paigram.v1;

option go_package = "paigram/internal/grpc/pb/v1;pb";

// 错误代码
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_ARGUMENT = 1;
  ERROR_CODE_NOT_FOUND = 2;
  ERROR_CODE_ALREADY_EXISTS = 3;
  ERROR_CODE_PERMISSION_DENIED = 4;
  ERROR_CODE_UNAUTHENTICATED = 5;
  ERROR_CODE_RESOURCE_EXHAUSTED = 6;
  ERROR_CODE_FAILED_PRECONDITION = 7;
  ERROR_CODE_ABORTED = 8;
  ERROR_CODE_INTERNAL = 9;
  ERROR_CODE_UNAVAILABLE = 10;
}

// 分页请求
message PageRequest {
  int32 page = 1;
  int32 page_size = 2;
  string sort_by = 3;
  bool desc = 4;
}

// 分页响应
message PageResponse {
  int32 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
}